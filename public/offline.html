<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#ffffff">
    <title>Offline</title>
    <style>
        :root { color-scheme: light; }
        body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Noto Sans", "Liberation Sans", sans-serif; background: #f7f7fb; color: #1f2937; }
        .wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
        .card { width: 100%; max-width: 520px; background: #ffffff; border: 1px solid #e5e7eb; border-radius: 18px; padding: 18px 18px; box-shadow: 0 1px 0 rgba(0,0,0,0.02); }
        h1 { margin: 0 0 10px; font-size: 18px; }
        p { margin: 0; font-size: 15px; line-height: 1.5; color: #374151; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <h1>Offline</h1>
            <p>Koneksi internet terputus. Silakan coba lagi saat koneksi tersedia.</p>
        </div>
    </div>
</body>
</html>
